name: CD Backend Docker

on:
  workflow_run:
    workflows: ["CI Backend"]
    types:
      - completed

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        host:
          - ${{ secrets.EC2_HOST }}
          - ${{ secrets.EC2_HOST_2 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Prepare image name
        id: prep
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO_LC=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "image_name=ghcr.io/$OWNER_LC/$REPO_LC/logitrans-backend:latest" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./FASE 3/backend
          file: ./FASE 3/backend/Dockerfile
          push: true
          no-cache: true
          tags: ${{ steps.prep.outputs.image_name }}

      - name: Setup SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          cat <<'KEY' > ~/.ssh/id_rsa
          ${{ secrets.EC2_SSH_KEY }}
          KEY
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ matrix.host }} >> ~/.ssh/known_hosts

      - name: Deploy on EC2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ matrix.host }} << 'EOF'
            cd "${{ secrets.APP_DIR }}"
            docker compose pull
            docker compose up -d
            docker image prune -f
          EOF
