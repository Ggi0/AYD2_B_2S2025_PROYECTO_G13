name: CD Backend Docker

on:
  workflow_run:
    workflows: ["CI Backend"]
    types:
      - completed

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Generar nombre de imagen dinámico en minúsculas
      - name: Prepare image name
        id: prep
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO_LC=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "image_name=ghcr.io/$OWNER_LC/$REPO_LC/logitrans-backend:latest" >> $GITHUB_OUTPUT

      # Login GHCR usando GITHUB_TOKEN (correcto para repos colaborador)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build + Push imagen
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./FASE 3/backend
          file: ./FASE 3/backend/Dockerfile
          push: true
          tags: ${{ steps.prep.outputs.image_name }}

      # Setup SSH (USANDO BASE64)
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # Deploy en EC2
      - name: Deploy on EC2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
            cd ${{ secrets.APP_DIR }}
            docker compose pull
            docker compose up -d
            docker image prune -f
          EOF
